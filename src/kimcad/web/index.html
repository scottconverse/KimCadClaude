<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KimCad</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --line: #2a2f3a; --ink: #e7ebf0;
    --muted: #99a2b2; --accent: #4f8cff; --ok: #36c281; --warn: #e3a008; --fail: #f0506e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 20px; margin: 0; letter-spacing: .5px; }
  header span { color: var(--muted); font-size: 13px; }
  main { max-width: 1040px; margin: 0 auto; padding: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 18px; }
  textarea {
    width: 100%; min-height: 76px; resize: vertical; background: #11141a; color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px; padding: 12px; font: inherit;
  }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 18px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  button.secondary { background: #2a2f3a; }
  .muted { color: var(--muted); }
  .hidden { display: none; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .badge.pass { background: rgba(54,194,129,.15); color: var(--ok); }
  .badge.warn { background: rgba(227,160,8,.15); color: var(--warn); }
  .badge.fail { background: rgba(240,80,110,.15); color: var(--fail); }
  h2 { font-size: 17px; margin: 0 0 4px; }
  table { width: 100%; border-collapse: collapse; margin: 14px 0; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  th { color: var(--muted); font-weight: 600; font-size: 13px; }
  .axis-ok { color: var(--ok); } .axis-bad { color: var(--fail); }
  ul.findings { list-style: none; padding: 0; margin: 10px 0 0; }
  ul.findings li { padding: 6px 0; border-bottom: 1px solid var(--line); display: flex; gap: 10px; }
  .lvl { font-size: 11px; font-weight: 700; text-transform: uppercase; min-width: 46px; }
  .lvl.pass { color: var(--ok); } .lvl.warn { color: var(--warn); } .lvl.fail { color: var(--fail); }
  #viewer { width: 100%; height: 340px; background: #0b0d11; border-radius: 8px; margin-top: 14px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .note { font-size: 13px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
<header><h1>KimCad</h1><span>describe a part &rarr; printable model</span></header>
<main>
  <div class="card">
    <label for="prompt" class="muted">Describe the part you want to print:</label>
    <textarea id="prompt" placeholder="e.g. A wall hook with a 60 mm tall, 25 mm wide back plate, 4 mm thick, two 4 mm screw holes 30 mm apart, and a hook arm projecting 35 mm forward."></textarea>
    <div class="row">
      <button id="go">Design it</button>
      <span id="status" class="muted"></span>
    </div>
  </div>

  <div id="clarify" class="card hidden">
    <h2>One detail first</h2>
    <p id="clarifyQ" class="muted"></p>
    <label for="answer" class="muted">Your answer:</label>
    <textarea id="answer" placeholder="Your answer…"></textarea>
    <div class="row"><button id="goAnswer">Continue</button></div>
  </div>

  <div id="result" class="card hidden">
    <div class="row" style="justify-content: space-between; margin-top: 0;">
      <h2 id="title"></h2>
      <span id="gateBadge" class="badge"></span>
    </div>
    <p id="summary" class="muted"></p>
    <p id="headline"></p>

    <table id="dimsTable" class="hidden">
      <thead><tr><th>Axis</th><th>Target (mm)</th><th>Actual (mm)</th><th>Match</th></tr></thead>
      <tbody id="dimsBody"></tbody>
    </table>

    <ul id="findings" class="findings"></ul>

    <div id="viewer"></div>
    <p id="viewerNote" class="note hidden"></p>

    <div class="row">
      <button id="prepare" class="secondary" disabled title="Coming in the next slice">Prepare print (G-code)</button>
      <span class="note">G-code is generated only on explicit confirmation — wired in the next slice. The validated 3D model is ready now.</span>
    </div>
  </div>

  <div id="error" class="card hidden">
    <h2 style="color: var(--fail);">Couldn't build that</h2>
    <p id="errorMsg" class="muted"></p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let lastPrompt = "";

async function design(prompt) {
  setStatus(true, "Designing… this can take a few minutes on CPU.");
  hide("clarify"); hide("result"); hide("error");
  try {
    const res = await fetch("/api/design", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Request failed."); return; }
    render(data);
  } catch (e) {
    showError("Could not reach the server: " + e.message);
  } finally {
    setStatus(false, "");
  }
}

function render(data) {
  if (data.status === "clarification_needed") {
    $("clarifyQ").textContent = data.clarification || "Could you add a key dimension?";
    show("clarify");
    return;
  }
  if (data.status === "render_failed" || data.error && !data.report) {
    showError(data.error || "The model could not be produced after retries.");
    return;
  }
  // completed or gate_failed — both produce a report worth showing
  const plan = data.plan || {}, report = data.report || {};
  $("title").textContent = plan.object_type || "Part";
  $("summary").textContent = plan.summary || "";
  $("headline").textContent = report.headline || "";

  const badge = $("gateBadge");
  const status = (report.gate_status || (data.status === "gate_failed" ? "fail" : "")).toLowerCase();
  badge.className = "badge " + (status || "warn");
  badge.textContent = status ? status : "—";

  renderDims(report.dims || []);
  renderFindings(report.findings || []);
  show("result");

  if (data.mesh_url) showModel(data.mesh_url);
  else viewerFallback("No 3D model was produced.");
}

function renderDims(dims) {
  const body = $("dimsBody"); body.innerHTML = "";
  if (!dims.length) { $("dimsTable").classList.add("hidden"); return; }
  for (const d of dims) {
    const tr = document.createElement("tr");
    const mark = d.ok ? '<span class="axis-ok">&#10003; exact</span>'
                      : '<span class="axis-bad">&#10007; off</span>';
    tr.innerHTML = `<td>${d.axis}</td><td>${d.target.toFixed(2)}</td><td>${d.actual.toFixed(2)}</td><td>${mark}</td>`;
    body.appendChild(tr);
  }
  $("dimsTable").classList.remove("hidden");
}

function renderFindings(findings) {
  const ul = $("findings"); ul.innerHTML = "";
  for (const f of findings) {
    const li = document.createElement("li");
    const lvl = (f.level || "").toLowerCase();
    li.innerHTML = `<span class="lvl ${lvl}">${f.level}</span><span>${escapeHtml(f.message)}</span>`;
    ul.appendChild(li);
  }
}

// --- 3D preview ---------------------------------------------------------------
let renderer, scene, camera, controls, animating = false;

function showModel(url) {
  $("viewerNote").classList.add("hidden");
  if (typeof THREE === "undefined" || !THREE.STLLoader) {
    viewerFallback("3D preview unavailable (viewer failed to load). The model is still saved.");
    return;
  }
  try {
    const el = $("viewer");
    el.innerHTML = "";
    const w = el.clientWidth, h = el.clientHeight;
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x0b0d11);
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 5000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(w, h); el.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444455, 1.1));
    const dir = new THREE.DirectionalLight(0xffffff, 0.7); dir.position.set(1, 1, 2); scene.add(dir);
    if (THREE.OrbitControls) { controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; }

    new THREE.STLLoader().load(url, (geo) => {
      geo.computeVertexNormals();
      geo.center();
      const mat = new THREE.MeshStandardMaterial({ color: 0x4f8cff, metalness: 0.1, roughness: 0.6 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2; // STL Z-up -> view
      scene.add(mesh);
      geo.computeBoundingSphere();
      const r = geo.boundingSphere.radius || 50;
      camera.position.set(r * 1.8, r * 1.4, r * 1.8);
      camera.lookAt(0, 0, 0);
      if (!animating) { animating = true; animate(); }
    }, undefined, () => viewerFallback("Could not load the 3D model for preview."));
  } catch (e) {
    viewerFallback("3D preview error: " + e.message);
  }
}

function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

function viewerFallback(msg) {
  $("viewer").innerHTML = "";
  const note = $("viewerNote"); note.textContent = msg; note.classList.remove("hidden");
}

// --- helpers ------------------------------------------------------------------
function setStatus(busy, msg) {
  $("go").disabled = busy; $("goAnswer").disabled = busy;
  $("status").innerHTML = busy ? `<span class="spinner"></span> ${escapeHtml(msg)}` : "";
}
function show(id) { $(id).classList.remove("hidden"); }
function hide(id) { $(id).classList.add("hidden"); }
function showError(msg) { $("errorMsg").textContent = msg; show("error"); }
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

$("go").addEventListener("click", () => {
  lastPrompt = $("prompt").value.trim();
  if (lastPrompt) design(lastPrompt);
});
$("goAnswer").addEventListener("click", () => {
  const ans = $("answer").value.trim();
  if (ans) design(lastPrompt + "\n\nAdditional detail: " + ans);
});
</script>
</body>
</html>
