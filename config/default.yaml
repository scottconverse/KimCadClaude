# KimCad default configuration.
# Copy to config/local.yaml (gitignored) to override on a given machine.
# VERIFY markers: re-check per spec §7.5 before relying on the value.

binaries:
  # Paths are relative to the project root unless absolute.
  # Populated by the tools/ fetch step; override here for a system install.
  openscad: tools/openscad/openscad.exe
  orcaslicer: tools/orcaslicer/orca-slicer.exe

llm:
  # Active backend: one of the keys under `backends`.
  # Local-first: no cloud calls. Cloud backends remain defined for later opt-in.
  active: local

  backends:
    cloud_deepseek:
      provider: deepseek
      base_url: https://api.deepseek.com/v1
      model_name: deepseek-v4-flash   # VERIFY §7.1 — exact tag + pricing move weekly
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

    local:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # Ollama default; LM Studio uses :1234
      model_name: gemma4:e4b                # on-device model (~4B effective) sized for the
                                            # 32 GB / 780M-iGPU target — fast + stable there.
                                            # gemma3:12b is too big/slow for the target;
                                            # override in local.yaml per machine
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false     # Ollama: rely on JSON-instructed prompt

    custom_openrouter:
      provider: openai_compatible
      base_url: https://openrouter.ai/api/v1
      model_name: ""                         # user supplies
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

defaults:
  printer: bambu_p2s
  material: pla
  output_format: "3mf"   # falls back to "stl" if OpenSCAD lacks lib3mf

# Build volume = [x, y, z] in mm. nozzle_diameter in mm.
# OrcaSlicer profile names below are verified against the pinned shipped build
# (v2.4.0-alpha resources/profiles/) — each per-material filament profile is checked to
# resolve, be compatible with the machine, and live-slice. orca_filament_profiles is the
# SOLE source of truth per printer: a material with no entry is honestly "not available" on
# that printer (no cross-vendor generic fallback, which could mis-slice on the wrong machine).
# Kim's three printers — Bambu P2S, Bambu A1, and the Elegoo Neptune 4 Max — are all sliceable.
printers:
  bambu_p2s:
    name: "Bambu Lab P2S"
    build_volume: [256, 256, 256]   # VERIFY exact P2S envelope (P-series standard assumed)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab P2S 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL P2S"
    # Per-material filament profiles, each verified to live-slice on this machine.
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL P2S"
      petg: "Generic PETG @BBL P2S"
      tpu: "Bambu TPU 95A @BBL P2S"
      abs: "Bambu ABS @BBL P2S"
    reference_hardware: true          # target hardware (validated in the final beta, not yet)
  bambu_a1:
    name: "Bambu Lab A1"
    build_volume: [256, 256, 256]   # VERIFY exact A1 envelope (nominal 256³; A1 is a
                                    # different machine class than the P-series)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab A1 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL A1"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL A1"
      petg: "Bambu PETG Basic @BBL A1"
      tpu: "Bambu TPU 95A @BBL A1"
      abs: "Bambu ABS @BBL A1"
    reference_hardware: true          # Kim's; validated in the final beta, not yet
  elegoo_neptune_4_max:
    name: "Elegoo Neptune 4 Max"
    build_volume: [420, 420, 480]   # matches the shipped machine profile's printable area
    nozzle_diameter: 0.4
    orca_machine_profile: "Elegoo Neptune 4 Max (0.4 nozzle)"
    # The shipped OrcaSlicer names this printer's *machine* profile with spaces
    # ("Neptune 4 Max") but its *process* profiles without ("Neptune4Max"); both ship.
    orca_process_profile: "0.20mm Standard @Elegoo Neptune4Max (0.4 nozzle)"
    orca_filament_profiles:
      pla: "Generic PLA @Elegoo"
      petg: "Generic PETG @Elegoo"
      abs: "Generic ABS @Elegoo"
      # No TPU entry: the shipped OrcaSlicer has no TPU filament profile compatible with the
      # Neptune 4 Max, so TPU is honestly NOT offered for this printer rather than silently
      # mapped to an incompatible (Bambu) generic. (Verified: no Elegoo TPU profile ships.)
    reference_hardware: true          # target hardware (validated in the final beta, not yet)

# Min recommended wall thickness is computed as wall_multiplier * nozzle_diameter
# unless a material overrides it. Temps are nozzle/bed in °C.
#
# CONTRACT (read before trusting these for a print): these temps + wall_multiplier feed
# the *Printability Gate* (wall-thickness check), not the slice. At slice time the
# material only selects the OrcaSlicer *filament profile* — which carries its own
# temps/flow — so changing nozzle_temp here does not change the sliced temperatures.
# Each printer maps every material it can print to a verified filament profile (see
# orca_filament_profiles above) — Bambu-branded where one exists, an Elegoo/Generic profile
# otherwise. A few combinations still use a vendor "Generic <MATERIAL>" profile (e.g. P2S
# PETG, the Elegoo's PLA/PETG/ABS); the UI flags those as generic.
materials:
  pla:   { name: "PLA",     nozzle_temp: 210, bed_temp: 55,  wall_multiplier: 2.0, shrinkage: 0.002 }
  petg:  { name: "PETG",    nozzle_temp: 240, bed_temp: 75,  wall_multiplier: 2.5, shrinkage: 0.004 }
  tpu:   { name: "TPU",     nozzle_temp: 225, bed_temp: 45,  wall_multiplier: 3.0, shrinkage: 0.008 }
  abs:   { name: "ABS/ASA", nozzle_temp: 250, bed_temp: 100, wall_multiplier: 2.5, shrinkage: 0.006 }

# Send-to-printer connectors. Each named target the CLI `--send <name>` / the web can
# print to. The API key is read from the named env var at send time, never stored here.
# No real hardware is driven until the final beta — "mock" is a built-in loopback to try
# the flow, and a mock OctoPrint server ships (`python -m kimcad.mock_printer`).
connectors:
  mock:
    type: loopback
  octoprint:
    type: octoprint
    base_url: http://127.0.0.1:5000   # your OctoPrint instance
    api_key_env: OCTOPRINT_API_KEY    # set this env var to your OctoPrint API key
  # Klipper printers (via Moonraker): Creality w/ Klipper, Voron, RatRig, Mainsail/Fluidd.
  # Uncomment + point base_url at your printer. The API key is OPTIONAL (Moonraker often runs
  # unauthenticated on a trusted LAN); set api_key_env only if your [authorization] requires it.
  # moonraker:
  #   type: moonraker
  #   base_url: http://127.0.0.1:7125
  #   api_key_env: MOONRAKER_API_KEY

limits:
  openscad_timeout_simple_s: 30
  openscad_timeout_complex_s: 120
  max_output_bytes: 209715200   # 200 MB render guard
  slice_timeout_s: 600          # OrcaSlicer is CPU-bound on the 780M target; be generous
