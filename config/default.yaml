# KimCad default configuration.
# Copy to config/local.yaml (gitignored) to override on a given machine.
# VERIFY markers: re-check per spec §7.5 before relying on the value.

binaries:
  # Paths are relative to the project root unless absolute.
  # Populated by the tools/ fetch step; override here for a system install.
  openscad: tools/openscad/openscad.exe
  orcaslicer: tools/orcaslicer/orca-slicer.exe
  # Stage 7 validation engine (PrintProof3D, owner's MIT Rust binary, invoked at arm's length).
  # The binary is NOT shipped with KimCad; this is just the conventional location the build/fetch
  # step would place it. Until a binary actually exists at this path, KimCad resolves it to
  # "not present" and Smart Mesh falls back to its own gate (honestly, at lower confidence) — so
  # this key is inert by default, not an active dependency. Build the engine (cargo build
  # --release) and drop it here, or set an absolute path in config/local.yaml, to wire it in.
  # See docs/printproof3d-integration.md.
  printproof3d: tools/printproof3d/printproof3d.exe
  # Stage 8 CadQuery backend interpreter. KimCad targets Python 3.13 and CadQuery runs on
  # 3.13 too — but generated CadQuery code still executes OUT-OF-PROCESS in its own
  # interpreter (a security-isolation choice, not a version constraint). Point this at a
  # Python that has `cadquery` installed (pip install cadquery). Values:
  #   null (default) -> auto-discover (the repo-local .venv-cq313 first, then
  #                     `py -3.13/-3.12/-3.11`, then python3.13/.. on PATH)
  #   false or ""    -> force the CadQuery backend OFF even if an interpreter exists
  #   "<path>"       -> use this exact python.exe (must have cadquery), no auto-discovery
  # When no interpreter is found the CadQuery backend simply stays off (OpenSCAD still works).
  cadquery_python: null

# Optional per-user paths (Stage 7). Sensible defaults; uncomment to relocate.
# paths:
#   # The Smart Mesh learning store (local-first; nothing leaves the machine). Unset (the default)
#   # => ~/.kimcad/history.json — per-user, outside the repo so it's never committed. Set an
#   # ABSOLUTE path to relocate it; a relative path resolves against the project root (no ~ expansion).
#   history: C:\Users\you\.kimcad\history.json

llm:
  # Active backend: one of the keys under `backends`.
  # Local-first: no cloud calls. Cloud backends remain defined for later opt-in.
  active: local
  # Optional fallback backend key. When set, a primary connection/timeout/model-not-found
  # error transparently retries against this backend instead of failing immediately.
  # Example: set to cloud_deepseek in local.yaml to fall back to cloud when Ollama is down.
  alt_backend: null

  backends:
    cloud_deepseek:
      provider: deepseek
      base_url: https://api.deepseek.com/v1
      model_name: deepseek-v4-flash   # VERIFY §7.1 — exact tag + pricing move weekly
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

    local:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # Ollama default; LM Studio uses :1234
      model_name: gemma4:e4b                # on-device model (~4B effective) sized for the
                                            # 32 GB / 780M-iGPU target — fast + stable there.
                                            # gemma3:12b is too big/slow for the target;
                                            # override in local.yaml per machine
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false     # Ollama: rely on JSON-instructed prompt
      vision_model: qwen2.5vl:3b            # Stage 9: the DEDICATED local vision model for the
                                            # photo/sketch on-ramps (ollama pull qwen2.5vl:3b).
                                            # Measured on-target: gemma4:e4b's vision is broken
                                            # on this stack (reports "no image provided"), while
                                            # qwen2.5vl:3b reads dimensioned sketches 3/3 — see
                                            # docs/benchmarks/stage-9-vision-onramps.md. The image
                                            # never leaves the machine either way.

    local_qwen:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # same Ollama; the Stage 6 bake-off challenger
      model_name: qwen2.5-coder:1.5b        # Stage 6 candidate — evaluated via the live bake-off
                                            # 2026-06-02 and REJECTED (0/10: a code model can't
                                            # produce a design plan), so `local` (gemma) stays the
                                            # default. Retained as a selectable `--backend` to
                                            # re-run the comparison (`kimcad bakeoff`).
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false

    custom_openrouter:
      provider: openai_compatible
      base_url: https://openrouter.ai/api/v1
      model_name: ""                         # user supplies
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

defaults:
  printer: bambu_p2s
  material: pla
  output_format: "3mf"   # falls back to "stl" if OpenSCAD lacks lib3mf

# Build volume = [x, y, z] in mm. nozzle_diameter in mm.
# OrcaSlicer profile names below are verified against the pinned shipped build
# (v2.4.0-alpha resources/profiles/) — each per-material filament profile is checked to
# resolve, be compatible with the machine, and live-slice. orca_filament_profiles is the
# SOLE source of truth per printer: a material with no entry is honestly "not available" on
# that printer (no cross-vendor generic fallback, which could mis-slice on the wrong machine).
# Kim's three printers — Bambu P2S, Bambu A1, and the Elegoo Neptune 4 Max — are all sliceable.
printers:
  bambu_p2s:
    name: "Bambu Lab P2S"
    build_volume: [256, 256, 256]   # VERIFIED == the shipped Orca machine profile's printable
                                    # area (test_configured_build_volumes_match_the_shipped_orca_profiles)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab P2S 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL P2S"
    # Per-material filament profiles, each verified to live-slice on this machine.
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL P2S"
      petg: "Generic PETG @BBL P2S"
      tpu: "Bambu TPU 95A @BBL P2S"
      abs: "Bambu ABS @BBL P2S"
    reference_hardware: true          # target hardware (validated in the final beta, not yet)
  bambu_a1:
    name: "Bambu Lab A1"
    build_volume: [256, 256, 256]   # VERIFIED == the shipped Orca machine profile's printable
                                    # area (same pin test as the P2S)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab A1 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL A1"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL A1"
      petg: "Bambu PETG Basic @BBL A1"
      tpu: "Bambu TPU 95A @BBL A1"
      abs: "Bambu ABS @BBL A1"
    reference_hardware: true          # Kim's; validated in the final beta, not yet
  elegoo_neptune_4_max:
    name: "Elegoo Neptune 4 Max"
    build_volume: [420, 420, 480]   # matches the shipped machine profile's printable area
    nozzle_diameter: 0.4
    orca_machine_profile: "Elegoo Neptune 4 Max (0.4 nozzle)"
    # The shipped OrcaSlicer names this printer's *machine* profile with spaces
    # ("Neptune 4 Max") but its *process* profiles without ("Neptune4Max"); both ship.
    orca_process_profile: "0.20mm Standard @Elegoo Neptune4Max (0.4 nozzle)"
    orca_filament_profiles:
      pla: "Generic PLA @Elegoo"
      petg: "Generic PETG @Elegoo"
      abs: "Generic ABS @Elegoo"
      # No TPU entry: the shipped OrcaSlicer has no TPU filament profile compatible with the
      # Neptune 4 Max, so TPU is honestly NOT offered for this printer rather than silently
      # mapped to an incompatible (Bambu) generic. (Verified: no Elegoo TPU profile ships.)
    reference_hardware: true          # target hardware (validated in the final beta, not yet)

# Min recommended wall thickness is computed as wall_multiplier * nozzle_diameter
# unless a material overrides it. Temps are nozzle/bed in °C.
#
# CONTRACT (read before trusting these for a print): these temps + wall_multiplier feed
# the *Printability Gate* (wall-thickness check), not the slice. At slice time the
# material only selects the OrcaSlicer *filament profile* — which carries its own
# temps/flow — so changing nozzle_temp here does not change the sliced temperatures.
# Each printer maps every material it can print to a verified filament profile (see
# orca_filament_profiles above) — Bambu-branded where one exists, an Elegoo/Generic profile
# otherwise. A few combinations still use a vendor "Generic <MATERIAL>" profile (e.g. P2S
# PETG, the Elegoo's PLA/PETG/ABS); the UI flags those as generic.
#
# `density` is nominal filament density in g/cm³ (PLA ~1.24, PETG ~1.27, TPU ~1.21, ABS ~1.04).
# It's used ONLY to estimate print *weight* from the slicer's reported filament volume when the
# OrcaSlicer profile carries no density of its own (several shipped vendor profiles set
# filament_density=0, so they emit volume but no grams). A real spool's density varies by
# brand/colour, so a weight derived from this is an estimate — the UI labels it as one.
materials:
  pla:   { name: "PLA",     nozzle_temp: 210, bed_temp: 55,  wall_multiplier: 2.0, shrinkage: 0.002, density: 1.24 }
  petg:  { name: "PETG",    nozzle_temp: 240, bed_temp: 75,  wall_multiplier: 2.5, shrinkage: 0.004, density: 1.27 }
  tpu:   { name: "TPU",     nozzle_temp: 225, bed_temp: 45,  wall_multiplier: 3.0, shrinkage: 0.008, density: 1.21 }
  abs:   { name: "ABS/ASA", nozzle_temp: 250, bed_temp: 100, wall_multiplier: 2.5, shrinkage: 0.006, density: 1.04 }

# Send-to-printer connectors. Each named target the CLI `--send <name>` / the web can
# print to. The API key is read from the named env var at send time, never stored here.
# No real hardware is driven until the final beta — "mock" is a built-in loopback to try
# the flow, and a mock OctoPrint server ships (`python -m kimcad.mock_printer`).
connectors:
  mock:
    type: loopback
  octoprint:
    type: octoprint
    base_url: http://127.0.0.1:5000   # your OctoPrint instance
    api_key_env: OCTOPRINT_API_KEY    # set this env var to your OctoPrint API key
  # Klipper (Moonraker) + Prusa (PrusaLink) ship visible-but-unconfigured like the Bambu
  # templates below (beta-gate BG-U007): fill in the address in Settings -> Printer
  # connections. Moonraker's API key is OPTIONAL (often unauthenticated on a trusted LAN);
  # set its env var only if your [authorization] requires it.
  moonraker:
    type: moonraker
    base_url:                       # e.g. http://192.168.0.40 (Mainsail/Fluidd box)
    api_key_env: MOONRAKER_API_KEY
  prusalink:
    type: prusalink
    base_url:                       # the printer's IP, e.g. http://192.168.0.50
    api_key_env: PRUSALINK_API_KEY
    storage: usb        # target storage; "usb" (MK4/XL default) or "local" (e.g. MINI/SD)
  # Bambu Lab printers (P2S / A1 family), native LAN mode (Stage 10). Needs the OPTIONAL
  # bambulabs-api package (pip install bambulabs-api). On the printer: enable LAN/Developer
  # mode, note the Access Code (Settings -> WLAN) and Serial (Settings -> Device). The access
  # code is a secret - it lives in the env var, never in this file. use_ams: false feeds from
  # the external spool instead of the AMS. These ship visible-but-unconfigured: the app's
  # send picker lists them disabled ('not set up yet') and names the missing piece when selected.
  bambu_p2s:
    type: bambu
    base_url:                       # the printer's IP, e.g. 192.168.0.60
    serial:                         # e.g. 01S00C123456789
    api_key_env: BAMBU_P2S_ACCESS_CODE
    use_ams: true
  bambu_a1:
    type: bambu
    base_url:                       # the printer's IP
    serial:
    api_key_env: BAMBU_A1_ACCESS_CODE
    use_ams: true

limits:
  openscad_timeout_simple_s: 30
  openscad_timeout_complex_s: 120
  max_output_bytes: 209715200   # 200 MB render guard
  slice_timeout_s: 600          # OrcaSlicer is CPU-bound on the 780M target; be generous
  cadquery_timeout_s: 120       # out-of-process CadQuery worker (OCCT) wall-clock limit
