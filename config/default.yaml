# KimCad default configuration.
# Copy to config/local.yaml (gitignored) to override on a given machine.
# VERIFY markers: re-check per spec §7.5 before relying on the value.

binaries:
  # Paths are relative to the project root unless absolute.
  # Populated by the tools/ fetch step; override here for a system install.
  openscad: tools/openscad/openscad.exe
  orcaslicer: tools/orcaslicer/orca-slicer.exe

llm:
  # Active backend: one of the keys under `backends`.
  # Local-first: no cloud calls. Cloud backends remain defined for later opt-in.
  active: local

  backends:
    cloud_deepseek:
      provider: deepseek
      base_url: https://api.deepseek.com/v1
      model_name: deepseek-v4-flash   # VERIFY §7.1 — exact tag + pricing move weekly
      api_key_env: DEEPSEEK_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

    local:
      provider: openai_compatible
      base_url: http://localhost:11434/v1   # Ollama default; LM Studio uses :1234
      model_name: gemma4:e4b                # on-device model (~4B effective) sized for the
                                            # 32 GB / 780M-iGPU target — fast + stable there.
                                            # gemma3:12b is too big/slow for the target;
                                            # override in local.yaml per machine
      api_key_env: null
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: false     # Ollama: rely on JSON-instructed prompt

    custom_openrouter:
      provider: openai_compatible
      base_url: https://openrouter.ai/api/v1
      model_name: ""                         # user supplies
      api_key_env: OPENROUTER_API_KEY
      temperature: 0.2
      max_tokens: 8192
      supports_structured_output: true

defaults:
  printer: bambu_p2s
  material: pla
  output_format: "3mf"   # falls back to "stl" if OpenSCAD lacks lib3mf

# Build volume = [x, y, z] in mm. nozzle_diameter in mm.
# OrcaSlicer profile names below are verified against the pinned shipped build
# (v2.4.0-alpha resources/profiles/). A material with no entry in orca_filament_profiles
# falls back to that material's "Generic <MATERIAL>" filament. Kim's printers are the
# Bambu P2S + A1 (fully sliceable) and the Elegoo Neptune 4 Max.
printers:
  bambu_p2s:
    name: "Bambu Lab P2S"
    build_volume: [256, 256, 256]   # VERIFY exact P2S envelope (P-series standard assumed)
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab P2S 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL P2S"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL P2S"
    reference_hardware: true          # target hardware (validated in the final beta, not yet)
  bambu_a1:
    name: "Bambu Lab A1"
    build_volume: [256, 256, 256]
    nozzle_diameter: 0.4
    orca_machine_profile: "Bambu Lab A1 0.4 nozzle"
    orca_process_profile: "0.20mm Standard @BBL A1"
    orca_filament_profiles:
      pla: "Bambu PLA Basic @BBL A1"
    reference_hardware: true          # Kim's; validated in the final beta, not yet
  elegoo_neptune_4_max:
    name: "Elegoo Neptune 4 Max"
    build_volume: [420, 420, 480]
    nozzle_diameter: 0.4
    orca_machine_profile: "Elegoo Neptune 4 Max (0.4 nozzle)"
    # NOTE: the shipped OrcaSlicer build has a machine + filament for the Neptune 4 Max
    # but no matching *process* profile, so slicing for this printer is not yet wired —
    # its process profile must be sourced. Bambu P2S/A1 are the sliceable path for now.
    orca_process_profile: null
    orca_filament_profiles:
      pla: "Generic PLA @Elegoo"
    reference_hardware: true          # target hardware (validated in the final beta, not yet)

# Min recommended wall thickness is computed as wall_multiplier * nozzle_diameter
# unless a material overrides it. Temps are nozzle/bed in °C.
materials:
  pla:   { name: "PLA",     nozzle_temp: 210, bed_temp: 55,  wall_multiplier: 2.0, shrinkage: 0.002 }
  petg:  { name: "PETG",    nozzle_temp: 240, bed_temp: 75,  wall_multiplier: 2.5, shrinkage: 0.004 }
  tpu:   { name: "TPU",     nozzle_temp: 225, bed_temp: 45,  wall_multiplier: 3.0, shrinkage: 0.008 }
  abs:   { name: "ABS/ASA", nozzle_temp: 250, bed_temp: 100, wall_multiplier: 2.5, shrinkage: 0.006 }

limits:
  openscad_timeout_simple_s: 30
  openscad_timeout_complex_s: 120
  max_output_bytes: 209715200   # 200 MB render guard
