name: CI

# Hosted CI for when GitHub Actions minutes are available. Until then the same
# checks run locally via the pre-push hook (.githooks/pre-push -> scripts/ci.sh).
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
