name: CI

# PARTIAL smoke check, NOT the authoritative gate. This runs Python lint + pytest only,
# on a Linux runner. It deliberately does NOT run the frontend Vitest suite, the SPA
# build / build-reproducibility check, npm audit, external-tool fetch, or the live
# (Windows-only) OrcaSlicer slice proof — those can't run on a hosted Linux runner.
# The authoritative gate is the LOCAL Windows pre-push hook (.githooks/pre-push ->
# scripts/ci.sh), which runs all of the above. A green check here is not equivalent to
# the local gate. (Currently disabled to save Actions minutes; `gh workflow enable CI`.)
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
